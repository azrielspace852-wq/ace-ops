<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ACE OPERATIONS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: { DEFAULT: '#6c6bfa', hover: '#8281fb' },
                    }
                }
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-body: #0a0a14;
            --bg-card: #16162a;
            --bg-hover: #1c1c35;
            --bg-sidebar: #080812;
            --border: #232340;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #6c6bfa;
        }
        [data-theme="light"] {
            --bg-body: #f5f5f5;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --bg-sidebar: #1a1a2e;
            --border: #e5e7eb;
            --text-primary: #1a1a2e;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --accent: #5b5af7;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-body); color: var(--text-primary); margin: 0; }
        .bg-card { background: var(--bg-card); }
        .bg-hover { background: var(--bg-hover); }
        .bg-sidebar { background: var(--bg-sidebar); }
        .border-theme { border-color: var(--border); }
        .text-secondary { color: var(--text-secondary); }
        .text-muted { color: var(--text-muted); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
        @keyframes logoPulse { 0%,100%{transform: scale(1);} 50%{transform: scale(1.08);} }
        @keyframes loadingBar { 0%{width:0%;} 50%{width:70%;} 100%{width:100%;} }
        @keyframes slideIn { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-[#0a0a14] transition-opacity duration-500">
    <div class="animate-[logoPulse_1.5s_ease-in-out_infinite] mb-6">
        <svg width="70" height="70" viewBox="0 0 64 64" fill="none">
            <rect x="2" y="2" width="60" height="60" rx="14" fill="#6c6bfa"/>
            <rect x="32" y="32" width="22" height="22" rx="5" fill="white" opacity="0.5"/>
            <path d="M20 44L28 20H36L44 44H38L36 38H28L26 44H20ZM30 32H34L32 26L30 32Z" fill="white"/>
            <circle cx="48" cy="16" r="4" fill="white" opacity="0.7"/>
            <circle cx="16" cy="48" r="3" fill="white" opacity="0.5"/>
        </svg>
    </div>
    <h1 class="text-2xl font-extrabold text-white tracking-tight mb-1">WELCOME TO ACE<span class="text-[#6c6bfa]">OPS</span></h1>
    <p class="text-xs text-gray-500 tracking-[0.3em] uppercase mb-8">BY AZRIEL ENTERPRISE</p>
    <div class="w-48 h-[3px] bg-white/10 rounded-full overflow-hidden">
        <div class="h-full bg-[#6c6bfa] rounded-full animate-[loadingBar_3s_ease-in-out_forwards]"></div>
    </div>
</div>

<!-- AUTH -->
<div id="authScreen" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-[#0a0a14]">
    <div class="w-full max-w-sm bg-card border border-theme rounded-2xl p-6 shadow-xl">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl mb-3" style="background:var(--accent)">
                <span class="text-white font-bold text-xl">A</span>
            </div>
            <h1 class="text-xl font-bold">ACE OPERATIONS</h1>
            <p class="text-sm text-secondary">Panel Manajemen AI</p>
        </div>
        <form id="loginForm" class="space-y-3">
            <input type="email" id="loginEmail" placeholder="Email" class="w-full px-3 py-2 bg-hover border border-theme rounded-lg text-sm" required />
            <input type="password" id="loginPassword" placeholder="Password" class="w-full px-3 py-2 bg-hover border border-theme rounded-lg text-sm" required />
            <button type="submit" class="w-full py-2 text-white font-semibold rounded-lg text-sm" style="background:var(--accent)">Masuk</button>
            <p class="text-center text-xs text-muted">Belum punya akun? <a href="#" id="showRegisterLink" class="font-semibold" style="color:var(--accent)">Daftar</a></p>
        </form>
        <form id="registerForm" class="space-y-3 hidden">
            <input type="text" id="regName" placeholder="Nama" class="w-full px-3 py-2 bg-hover border border-theme rounded-lg text-sm" required />
            <input type="email" id="regEmail" placeholder="Email" class="w-full px-3 py-2 bg-hover border border-theme rounded-lg text-sm" required />
            <input type="password" id="regPassword" placeholder="Password" class="w-full px-3 py-2 bg-hover border border-theme rounded-lg text-sm" required />
            <button type="submit" class="w-full py-2 text-white font-semibold rounded-lg text-sm" style="background:var(--accent)">Daftar</button>
            <p class="text-center text-xs text-muted">Sudah punya akun? <a href="#" id="showLoginLink" class="font-semibold" style="color:var(--accent)">Masuk</a></p>
        </form>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden flex min-h-screen">
    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden md:flex flex-col w-[250px] fixed h-screen bg-sidebar border-r border-theme z-[100] p-7">
        <div class="flex items-center gap-3 mb-10 px-1">
            <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
                <rect x="2" y="2" width="60" height="60" rx="14" fill="#6c6bfa"/>
                <rect x="32" y="32" width="22" height="22" rx="5" fill="white" opacity="0.5"/>
                <path d="M20 44L28 20H36L44 44H38L36 38H28L26 44H20ZM30 32H34L32 26L30 32Z" fill="white"/>
            </svg>
            <span class="text-lg font-bold text-white tracking-tight">ACE<span class="text-[#6c6bfa] font-normal">OPS</span></span>
        </div>
        <nav class="flex-1 flex flex-col gap-0.5" id="sidebarNav">
            <a href="#dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white bg-white/10"><span class="w-5 text-center opacity-70">&#9632;</span> Dashboard</a>
            <a href="#instances" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9670;</span> Instansi AI</a>
            <a href="#users" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9655;</span> Pengguna</a>
            <a href="#databases" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9640;</span> Database</a>
            <hr class="border-white/5 my-2 mx-2">
            <a href="#playground" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9654;</span> Playground</a>
            <a href="#knowledge" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9776;</span> Pengetahuan</a>
            <hr class="border-white/5 my-2 mx-2">
            <a href="#settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-white/5"><span class="w-5 text-center opacity-70">&#9881;</span> Pengaturan</a>
        </nav>
        <div class="border-t border-theme pt-4 mt-auto">
            <div class="flex items-center justify-between px-2 text-sm text-gray-500">
                <span id="themeLabel">Mode Gelap</span>
                <button id="themeToggle" class="w-11 h-6 bg-[#6c6bfa] rounded-full relative after:absolute after:w-[18px] after:h-[18px] after:bg-white after:rounded-full after:top-[3px] after:left-[3px] after:transition-transform"></button>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 md:ml-[250px] p-4 md:p-8 pb-24 md:pb-8 max-w-[1300px] w-full" id="mainContent"></main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-card border-t border-theme z-[200] safe-bottom backdrop-blur-xl" id="bottomNav">
        <div class="flex justify-around items-center max-w-[500px] mx-auto py-1.5 px-2">
            <button data-nav="dashboard" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-medium text-accent"><span class="text-lg leading-none">&#9632;</span> Dashboard</button>
            <button data-nav="instances" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-medium text-gray-500"><span class="text-lg leading-none">&#9670;</span> AI</button>
            <button data-nav="playground" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-medium text-gray-500"><span class="text-lg leading-none">&#9654;</span> Chat</button>
            <button data-nav="users" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-medium text-gray-500"><span class="text-lg leading-none">&#9655;</span> User</button>
            <div class="relative">
                <button id="moreBtn" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-medium text-gray-500"><span class="text-lg leading-none">&#9776;</span> Lainnya</button>
                <div id="moreMenu" class="hidden absolute bottom-full right-0 mb-2 bg-card border border-theme rounded-xl p-1.5 min-w-[150px] shadow-xl z-[300]">
                    <button data-nav="knowledge" class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-white/5"><span>&#9776;</span> Pengetahuan</button>
                    <button data-nav="databases" class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-white/5"><span>&#9640;</span> Database</button>
                    <button data-nav="settings" class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-white/5"><span>&#9881;</span> Pengaturan</button>
                    <hr class="border-white/5 my-1">
                    <button id="themeToggleMobile" class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-white/5"><span>&#9681;</span> Ganti Mode</button>
                </div>
            </div>
        </div>
    </nav>
</div>

<!-- TOAST -->
<div id="toastContainer" class="fixed top-4 right-4 z-[999] flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

<!-- SCRIPTS -->
<script type="module" src="js/config.js"></script>
<script type="module" src="js/state.js"></script>
<script type="module" src="js/utils.js"></script>
<script type="module" src="js/theme.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/api.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/instances.js"></script>
<script type="module" src="js/users.js"></script>
<script type="module" src="js/knowledge.js"></script>
<script type="module" src="js/playground.js"></script>
<script type="module" src="js/settings.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
